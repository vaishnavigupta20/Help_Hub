<!DOCTYPE html>
<html>
<head>
<title>Post Help</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#667eea,#764ba2);
min-height:100vh;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
}

.form-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
width:600px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
color:white;
}

input, textarea, select{
border-radius:15px !important;
padding:12px !important;
border:none !important;
}

textarea{
resize:none;
}

.submit-btn{
background:linear-gradient(45deg,#ff9800,#ff5722);
border:none;
padding:14px;
border-radius:30px;
font-weight:bold;
transition:0.3s;
}

.submit-btn:hover{
transform:scale(1.05);
}

.preview{
width:100%;
border-radius:15px;
margin-top:10px;
display:none;
}

.location-btn{
background:#00c853;
border:none;
padding:8px 15px;
border-radius:20px;
color:white;
margin-top:5px;
}

</style>
</head>

<body>

<div class="form-box">

<h2 class="mb-4">📢 Post Emergency Help</h2>

<form method="POST" enctype="multipart/form-data">

<select name="type" class="form-control mb-3" required>
<option value="">Select Help Type</option>
<option>Blood Need</option>
<option>Animal Rescue</option>
<option>Food Help</option>
<option>Lost Pet</option>
<option>Medical Emergency</option>
</select>

<textarea 
name="description" 
class="form-control mb-1" 
placeholder="Describe issue..." 
maxlength="200" 
oninput="countChars(this)" 
required></textarea>

<small id="charCount">0 / 200</small>

<input 
type="file" 
name="photo" 
class="form-control mb-3 mt-2" 
accept="image/*"
onchange="previewImage(event)">

<img id="imgPreview" class="preview">

<input type="text" id="location" name="location" class="form-control mb-1" placeholder="Location" required>

<button type="button" class="location-btn" onclick="getLocation()">📍 Auto Detect</button>

<input type="text" name="contact" class="form-control mt-3 mb-3" placeholder="Contact Number" required>

<button class="btn submit-btn w-100">Submit Emergency</button>

</form>

</div>

<script>

function countChars(el){
document.getElementById("charCount").innerText =
el.value.length + " / 200";
}

function previewImage(event){

let file = event.target.files[0];
let img = document.getElementById("imgPreview");

if(file){
img.src = URL.createObjectURL(file);
img.style.display="block";
}else{
img.style.display="none";
}

}

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("location").value =
pos.coords.latitude + "," + pos.coords.longitude;

},function(){
alert("Location permission denied");
});

}else{
alert("Geolocation not supported");
}

}

</script>

</body>
</html>
