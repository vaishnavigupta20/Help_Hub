<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Segoe UI;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.profile-card{
width:400px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
text-align:center;
}

.role{
padding:5px 12px;
border-radius:20px;
color:white;
font-size:12px;
}

.user{background:#2196f3}
.volunteer{background:#00c853}
.ngo{background:#ff5722}

.stat{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="profile-card">

<h2>👤 {{user.name}}</h2>

<p>{{user.email}}</p>

{% if user.role == "ngo" %}
<span class="role ngo">NGO Partner</span>
{% elif user.role == "volunteer" %}
<span class="role volunteer">Volunteer</span>
{% else %}
<span class="role user">User</span>
{% endif %}

<hr>

<div class="row">

<div class="col-6">
<div class="stat">{{total_requests}}</div>
<p>Requests</p>
</div>

<div class="col-6">
<div class="stat">{{completed_requests}}</div>
<p>Helped</p>
</div>

</div>

<br>

<a href="/dashboard" class="btn btn-dark w-100 mb-2">Dashboard</a>
<a href="/logout" class="btn btn-danger w-100">Logout</a>

</div>

</body>
</html>
