<!DOCTYPE html>
<html>
<head>
<title>HelpHub Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Segoe UI;
overflow:hidden;
}

/* GLASS CARD */

.card-box{
width:380px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.95);
box-shadow:0 25px 70px rgba(0,0,0,.3);
animation:fade .6s ease;
position:relative;
}

/* ANIMATION */

@keyframes fade{
from{opacity:0; transform:translateY(30px)}
to{opacity:1}
}

/* LOGO */

.logo{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:8px;
color:#111827;
}

/* SUBTITLE */

.subtitle{
text-align:center;
color:gray;
margin-bottom:25px;
}

/* BUTTON */

.btn-main{
background:linear-gradient(120deg,#ff6a88,#ff99ac);
border:none;
border-radius:40px;
padding:12px;
font-weight:600;
transition:.3s;
}

.btn-main:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* PASSWORD TOGGLE */

.toggle{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
}

/* LINK */

.signup-link{
text-decoration:none;
font-weight:600;
color:#764ba2;
}

.signup-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="card-box">

<div class="logo">🚑 HelpHub</div>
<div class="subtitle">Login to continue</div>

<!-- ⭐ FLASH MESSAGE SUPPORT -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-danger text-center">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST" action="/login">

<div class="mb-3">
<input name="email" type="email" class="form-control form-control-lg" placeholder="Email Address" required>
</div>

<div class="mb-3 position-relative">
<input id="pass" name="password" type="password" class="form-control form-control-lg" placeholder="Password" required>
<span class="toggle" onclick="togglePass()">👁</span>
</div>

<button class="btn btn-main w-100">Login</button>

</form>

<div class="text-center mt-4">
New user? <a href="/signup" class="signup-link">Create Account</a>
</div>

</div>

<script>

function togglePass(){
let p=document.getElementById("pass")
p.type = p.type === "password" ? "text" : "password"
}

</script>

</body>
</html>
