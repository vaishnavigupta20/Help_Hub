<!DOCTYPE html>
<html>
<head>
<title>HelpHub Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(120deg,#f093fb,#f5576c);
min-height:100vh;
transition:.4s;
}

.dark{
background:#0f172a !important;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:#111827;
padding:20px;
color:white;
transition:.4s;
}

.sidebar.hide{
transform:translateX(-250px);
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:8px;
}

.sidebar a:hover{
background:#1f2937;
}

/* MAIN */

.main{
margin-left:260px;
padding:20px;
transition:.4s;
}

.full{
margin-left:20px !important;
}

/* CARD */

.card{
border-radius:20px;
border:none;
background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);
transition:.3s;
}

.dark .card{
background:#1f2937;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 25px 60px rgba(0,0,0,.25);
}

/* MAP */

#map{
height:500px;
display:none;
border-radius:20px;
}

/* FAB */

.fab{
position:fixed;
bottom:30px;
right:30px;
}

.fab button{
display:block;
margin-top:10px;
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
}

/* BELL */

.bell{
font-size:24px;
cursor:pointer;
position:relative;
}

.dot{
position:absolute;
top:-5px;
right:-5px;
background:red;
width:12px;
height:12px;
border-radius:50%;
display:none;
}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h3>🚑 HelpHub</h3>

<a href="/">🏠 Home</a>
<a href="/request">🆘 Post Help</a>
<a href="#" onclick="toggleMap()">🗺 Map View</a>
<a href="#">⭐ Activity</a>

</div>

<div class="main" id="main">

<div class="d-flex justify-content-between mb-4">

<button class="btn btn-dark" onclick="toggleSidebar()">☰</button>

<h2>Dashboard</h2>

<div>
<span class="bell" onclick="checkNew()">🔔<div class="dot" id="dot"></div></span>
<button class="btn btn-dark ms-3" onclick="toggleMode()">🌙</button>
</div>

</div>

<div id="map"></div>

<div class="row" id="cards">

{% for r in data %}
<div class="col-md-4 mb-4">
<div class="card p-3">
<img src="/uploads/{{r.photo}}" class="img-fluid rounded mb-2">
<h5>{{r.help_type}}</h5>
<p>{{r.location}}</p>

{% if r.status=='Pending' %}
<span class="badge bg-danger">Pending</span>
{% else %}
<span class="badge bg-success">Done</span>
{% endif %}

<br><br>

{% if r.status=='Pending' %}
<a href="/accept/{{r._id}}" class="btn btn-primary btn-sm">Accept</a>
{% endif %}

</div>
</div>
{% endfor %}

</div>

</div>


<div class="fab">
<button class="btn btn-danger" onclick="goRequest()">🆘</button>
<button class="btn btn-success">🤝</button>
<button class="btn btn-warning" onclick="toggleMap()">🗺</button>
</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let mapVisible=false;

function toggleMap(){

mapVisible=!mapVisible;

let mapDiv=document.getElementById("map");

if(mapVisible){
mapDiv.style.display="block";

if(!map){

map=L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

fetch("/api/all")
.then(res=>res.json())
.then(data=>{
data.forEach(d=>{
if(d.location.includes(",")){
let parts=d.location.split(",");
let lat=parseFloat(parts[0]);
let lon=parseFloat(parts[1]);

L.marker([lat,lon])
.addTo(map)
.bindPopup("<b>"+d.help_type+"</b><br>"+d.status);
}
})
})

}

}else{
mapDiv.style.display="none";
}

}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("hide")
document.getElementById("main").classList.toggle("full")
}

function toggleMode(){
document.body.classList.toggle("dark")
}

function goRequest(){
window.location="/request"
}

/* Notification Polling */

let lastCount=0;

setInterval(()=>{
fetch("/api/count")
.then(res=>res.json())
.then(data=>{
if(lastCount!=0 && data.count>lastCount){
document.getElementById("dot").style.display="block"
}
lastCount=data.count
})
},4000)

function checkNew(){
alert("Check dashboard — new emergencies added.")
document.getElementById("dot").style.display="none"
}

</script>

</body>
</html>
