<h2>All Requests</h2>

{% for r in data %}

<div style="border:1px solid black; margin:10px; padding:10px">

<img src="../uploads/{{r.photo}}" width="150">

<h3>{{r.help_type}}</h3>

<p>{{r.description}}</p>

<p>📍 {{r.location}}</p>

<p>Status: {{r.status}}</p>

<a href="/accept/{{r.id}}">
<button>Mark Completed</button>
</a>

</div>

{% endfor %}
